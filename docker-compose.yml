version: '3'

services:
  wiki:
    image: requarks/wiki:2
    environment:
      DB_TYPE: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      PUID: 1000
      PGID: 1000
    depends_on:
      - db
    restart: unless-stopped
    volumes:
      - wiki-data:/wiki/data

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_USER: ${DB_USER}
    restart: unless-stopped
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  wiki-data:
  db-data: